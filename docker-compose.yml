services:
  # ── Hermes gateway（自定义镜像：含 opencode + gh CLI + lark-cli）──
  hermes:
    build:
      context: ./docker/hermes
      dockerfile: Dockerfile
    image: myopenclaw/hermes:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "${HERMES_PORT:-8642}:8642"
    volumes:
      - ${HOME}/.hermes:/opt/data
      - ${HOME}/.config/gh:/opt/gh-config
      - ${HOME}/.config/opencode:/opt/opencode-config
      - ${HOME}/.lark-cli:/opt/lark-config
      - ${HOME}/Zotero:/opt/zotero-data:ro

    environment:
      - GITHUB_TOKEN=${GH_TOKEN:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      # Blocked by Hermes env blacklist, materialized to secrets files by entrypoint
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LARK_CLI_APP_ID=${LARK_CLI_APP_ID:-}
      - LARK_CLI_APP_SECRET=${LARK_CLI_APP_SECRET:-}
      - LARK_CLI_IDM_APP_ID=${LARK_CLI_IDM_APP_ID:-}
      - LARK_CLI_IDM_APP_SECRET=${LARK_CLI_IDM_APP_SECRET:-}
      - RCLONE_CONFIG=/opt/data/rclone/rclone.conf
      # Zotero CLI (zotero-cli-cc)
      - ZOT_DATA_DIR=/opt/zotero-data
      - ZOTERO_API_KEY=${ZOTERO_API_KEY:-}
      - ZOTERO_LIBRARY_ID=${ZOTERO_LIBRARY_ID:-}
      - ZOTERO_LIBRARY_TYPE=${ZOTERO_LIBRARY_TYPE:-user}
      - GDRIVE_PAPERS_LOCAL_PATH=${GDRIVE_PAPERS_LOCAL_PATH:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "1g"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    networks:
      - myopenclaw-net

  # ── Hermes coder gateway（编程助手，GLM-5.1）──────────────────
  hermes-coder:
    image: myopenclaw/hermes:latest
    container_name: hermes-coder
    restart: unless-stopped
    command: gateway run --profile coder
    ports:
      - "${HERMES_CODER_PORT:-8643}:8642"
    volumes:
      - ${HOME}/.hermes:/opt/data
      - ${HOME}/.config/gh:/opt/gh-config
      - ${HOME}/.config/opencode:/opt/opencode-config
      - ${HOME}/.lark-cli:/opt/lark-config
      - ${HOME}/Zotero:/opt/zotero-data:ro

    environment:
      - GITHUB_TOKEN=${GH_TOKEN:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LARK_CLI_APP_ID=${LARK_CLI_APP_ID:-}
      - LARK_CLI_APP_SECRET=${LARK_CLI_APP_SECRET:-}
      - LARK_CLI_IDM_APP_ID=${LARK_CLI_IDM_APP_ID:-}
      - LARK_CLI_IDM_APP_SECRET=${LARK_CLI_IDM_APP_SECRET:-}
      - RCLONE_CONFIG=/opt/data/rclone/rclone.conf
      - HERMES_PROFILE=coder
      # Discord (爱码士 coder)
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS:-}
      - DISCORD_REQUIRE_MENTION=true
      # Zotero CLI (zotero-cli-cc)
      - ZOT_DATA_DIR=/opt/zotero-data
      - ZOTERO_API_KEY=${ZOTERO_API_KEY:-}
      - ZOTERO_LIBRARY_ID=${ZOTERO_LIBRARY_ID:-}
      - ZOTERO_LIBRARY_TYPE=${ZOTERO_LIBRARY_TYPE:-user}
      - GDRIVE_PAPERS_LOCAL_PATH=${GDRIVE_PAPERS_LOCAL_PATH:-}
    shm_size: "1g"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    networks:
      - myopenclaw-net

  # ── Hermes finance gateway（产业财经咨询）────────────────────
  hermes-finance:
    image: myopenclaw/hermes:latest
    container_name: hermes-finance
    restart: unless-stopped
    command: gateway run --profile finance
    ports:
      - "${HERMES_FINANCE_PORT:-8644}:8642"
    volumes:
      - ${HOME}/.hermes:/opt/data
      - ${HOME}/.config/gh:/opt/gh-config
      - ${HOME}/.config/opencode:/opt/opencode-config
      - ${HOME}/.lark-cli:/opt/lark-config
      - ${HOME}/Zotero:/opt/zotero-data:ro

    environment:
      - GITHUB_TOKEN=${GH_TOKEN:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LARK_CLI_APP_ID=${LARK_CLI_APP_ID:-}
      - LARK_CLI_APP_SECRET=${LARK_CLI_APP_SECRET:-}
      - LARK_CLI_IDM_APP_ID=${LARK_CLI_IDM_APP_ID:-}
      - LARK_CLI_IDM_APP_SECRET=${LARK_CLI_IDM_APP_SECRET:-}
      - RCLONE_CONFIG=/opt/data/rclone/rclone.conf
      - HERMES_PROFILE=finance
      # Zotero CLI (zotero-cli-cc)
      - ZOT_DATA_DIR=/opt/zotero-data
      - ZOTERO_API_KEY=${ZOTERO_API_KEY:-}
      - ZOTERO_LIBRARY_ID=${ZOTERO_LIBRARY_ID:-}
      - ZOTERO_LIBRARY_TYPE=${ZOTERO_LIBRARY_TYPE:-user}
      - GDRIVE_PAPERS_LOCAL_PATH=${GDRIVE_PAPERS_LOCAL_PATH:-}
      - FEISHU_APP_ID=${FINANCE_FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FINANCE_FEISHU_APP_SECRET:-}
      - FEISHU_DOMAIN=feishu
      - FEISHU_CONNECTION_MODE=websocket
      - FEISHU_GROUP_POLICY=open
    shm_size: "1g"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    networks:
      - myopenclaw-net

  # ── Hermes dashboard（可选，只读，与 gateway 同网络）─────────
  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0
    ports:
      - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    volumes:
      - ${HOME}/.hermes:/opt/data
    environment:
      - GATEWAY_HEALTH_URL=http://hermes:8642
    depends_on:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - myopenclaw-net

  # ── Claude Code + cc-connect（独立编码 Agent，飞书直连）──────
  claude-code:
    build:
      context: ./docker/claude-code
      dockerfile: Dockerfile
    image: myopenclaw/claude-code:latest
    container_name: claude-code
    restart: unless-stopped
    volumes:
      - ${HOME}/.claude:/opt/claude-config
      - ${HOME}/.config/gh:/opt/gh-config
      - ${HOME}/.cc-connect:/opt/cc-config
      - ${HOME}/code:/home/node/code
      - ${HOME}/Code:/home/node/Code
    environment:
      - GLM_API_KEY=${GLM_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CC_CONNECT_FEISHU_APP_ID=${CC_CONNECT_FEISHU_APP_ID:-}
      - CC_CONNECT_FEISHU_APP_SECRET=${CC_CONNECT_FEISHU_APP_SECRET:-}
      - TZ=${TZ:-Asia/Shanghai}
    ports:
      - "${CC_CONNECT_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "1g"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    networks:
      - myopenclaw-net

  # ── OpenClaw gateway ─────────────────────────────────────────
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "/fix-host-paths.sh && exec /usr/local/bin/docker-entrypoint.sh node openclaw.mjs gateway --allow-unconfigured"]
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    volumes:
      - ${HOME}/.openclaw:/home/node/.openclaw
      - ./openclaw/scripts/fix-host-paths.sh:/fix-host-paths.sh:ro
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - UNPAYWALL_EMAIL=${UNPAYWALL_EMAIL:-}
      - PAPER_FETCH_NO_SCIHUB=${PAPER_FETCH_NO_SCIHUB:-}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${OPENCLAW_GH_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - myopenclaw-net

  # ── OpenClaw CLI（按需运行，不常驻）─────────────────────────
  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-cli
    profiles:
      - cli
    volumes:
      - ${HOME}/.openclaw:/home/node/.openclaw
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway

  # ── 定时快照备份 ─────────────────────────────────────────────
  backup-cron:
    build:
      context: ./docker/backup-cron
      dockerfile: Dockerfile
    container_name: backup-cron
    restart: unless-stopped
    volumes:
      - ${HOME}/.hermes:/root/.hermes:ro
      - ${HOME}/.openclaw:/root/.openclaw:ro
      - ${HOME}/.claude:/root/.claude:ro
      - ${HOME}/.cc-connect:/root/.cc-connect:ro
      - ${HOME}/.myagentdata:/.myagentdata:ro
      - ${BACKUP_ROOT:-/tmp/myopenclaw-backups}:/backup:rw
      - ./hermes/scripts:/hermes-scripts:ro
      - ./openclaw/scripts:/openclaw-scripts:ro
      - ./claude/scripts:/claude-scripts:ro
      - ./scripts:/scripts:ro
    environment:
      - BACKUP_CRON=${BACKUP_CRON:-0 2 * * 0}
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-30}
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - myopenclaw-net

networks:
  myopenclaw-net:
    driver: bridge
